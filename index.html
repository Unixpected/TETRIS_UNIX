<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TETRIS — Select Mode</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
:root{
  --bg:#080c14;--bg-panel:#0d1520;--border:#1a3a5c;
  --accent:#00d4ff;--accent2:#ff2d6b;--accent3:#ffe600;
  --text:#c8e8ff;--text-dim:#4a7a9b;
  --glow-cyan:0 0 8px #00d4ff,0 0 20px #00d4ff44;
  --glow-yellow:0 0 8px #ffe600,0 0 20px #ffe60044;
  --glow-pink:0 0 8px #ff2d6b,0 0 20px #ff2d6b44;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;display:flex;align-items:center;justify-content:center;user-select:none;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);pointer-events:none}

.container{display:flex;flex-direction:column;align-items:center;gap:28px;padding:40px 48px;background:var(--bg-panel);border:1px solid var(--border);box-shadow:0 0 60px rgba(0,212,255,.12),inset 0 0 80px rgba(0,0,0,.4);min-width:340px;max-width:95vw}

.logo-block{display:flex;gap:4px}
.logo-letter{font-family:'Orbitron',monospace;font-weight:900;font-size:54px;color:var(--accent);text-shadow:var(--glow-cyan);animation:logo-pulse 2s ease-in-out infinite alternate}
.logo-letter:nth-child(2){animation-delay:.1s;color:#ffe600;text-shadow:var(--glow-yellow)}
.logo-letter:nth-child(3){animation-delay:.2s;color:#cc44ff}
.logo-letter:nth-child(4){animation-delay:.3s;color:#00ff88}
.logo-letter:nth-child(5){animation-delay:.4s;color:var(--accent2);text-shadow:var(--glow-pink)}
.logo-letter:nth-child(6){animation-delay:.5s;color:#ff8800}
@keyframes logo-pulse{from{transform:translateY(0)}to{transform:translateY(-5px)}}

.subtitle{font-size:10px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase}

/* Mode Toggle */
.toggle-row{display:flex;align-items:center;gap:12px;font-size:11px;letter-spacing:2px;color:var(--text-dim)}
.toggle-label{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px}
.toggle-label.active{color:var(--accent);text-shadow:var(--glow-cyan)}
.toggle-switch{position:relative;width:52px;height:26px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-track{position:absolute;inset:0;background:rgba(0,212,255,.1);border:1px solid var(--border);transition:background .2s}
.toggle-thumb{position:absolute;top:3px;left:3px;width:18px;height:18px;background:var(--accent);transition:transform .2s;box-shadow:var(--glow-cyan)}
.toggle-switch input:checked ~ .toggle-track{background:rgba(0,212,255,.15);border-color:var(--accent)}
.toggle-switch input:checked ~ .toggle-thumb{transform:translateX(26px)}

/* Mode Cards */
.mode-cards{display:flex;flex-direction:column;gap:14px;width:100%}
.mode-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:20px 24px;background:transparent;border:1px solid var(--border);cursor:pointer;text-decoration:none;color:var(--text);transition:all .15s;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.mode-card::before{content:'';position:absolute;inset:0;background:var(--accent);transform:translateX(-105%);transition:transform .25s;z-index:0}
.mode-card:hover::before,.mode-card:active::before{transform:translateX(0)}
.mode-card:hover,.mode-card:active{color:var(--bg);box-shadow:var(--glow-cyan)}
.mode-card .card-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:5px;width:100%}
.card-icon{font-size:28px}
.card-title{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;letter-spacing:3px}
.card-desc{font-size:10px;letter-spacing:1px;opacity:.7}

.mode-card.mp::before{background:var(--accent2)}
.mode-card.mp{border-color:var(--accent2);color:var(--text)}
.mode-card.mp:hover,.mode-card.mp:active{color:var(--bg);box-shadow:var(--glow-pink)}

.divider{width:100%;height:1px;background:var(--border)}
.version{font-size:9px;letter-spacing:2px;color:var(--text-dim);opacity:.5}
</style>
</head>
<body>
<div class="container">
  <div class="logo-block">
    <div class="logo-letter">T</div><div class="logo-letter">E</div>
    <div class="logo-letter">T</div><div class="logo-letter">R</div>
    <div class="logo-letter">I</div><div class="logo-letter">S</div>
  </div>
  <div class="subtitle">UNIX EDITION</div>

  <!-- Mobile / Desktop Toggle -->
  <div class="toggle-row">
    <span class="toggle-label" id="lbl-desktop">DESKTOP</span>
    <label class="toggle-switch">
      <input type="checkbox" id="mode-toggle">
      <div class="toggle-track"></div>
      <div class="toggle-thumb"></div>
    </label>
    <span class="toggle-label" id="lbl-mobile">MOBILE</span>
  </div>

  <div class="mode-cards">
    <a class="mode-card solo" id="btn-solo" href="solo.html">
      <div class="card-content">
        <div class="card-icon">▶</div>
        <div class="card-title">SOLO PLAY</div>
        <div class="card-desc">Single Player · Local</div>
      </div>
    </a>
    <a class="mode-card mp" id="btn-mp" href="multiplayer.html">
      <div class="card-content">
        <div class="card-icon">⚔</div>
        <div class="card-title">MULTIPLAYER</div>
        <div class="card-desc">Host or Join · Online via PeerJS</div>
      </div>
    </a>
  </div>

  <div class="divider"></div>
  <div class="version">WAMP 5.0 COMPATIBLE · GITHUB PAGES READY</div>
</div>

<script>
const toggle = document.getElementById('mode-toggle');
const lblDesktop = document.getElementById('lbl-desktop');
const lblMobile = document.getElementById('lbl-mobile');
const btnSolo = document.getElementById('btn-solo');
const btnMp = document.getElementById('btn-mp');

// Auto-detect mobile on load
if (/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)) {
  toggle.checked = true;
}

function updateLinks() {
  const isMobile = toggle.checked;
  lblDesktop.classList.toggle('active', !isMobile);
  lblMobile.classList.toggle('active', isMobile);
  const suffix = isMobile ? '?layout=mobile' : '?layout=desktop';
  btnSolo.href = 'solo.html' + suffix;
  btnMp.href = 'multiplayer.html' + suffix;
}

toggle.addEventListener('change', updateLinks);
updateLinks();
</script>
</body>
</html>
